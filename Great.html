<form>
    <fieldset> <legend>Student Orientation Registeration</legend>

        <p></p>
        <label for="fullname">Fullname:</label>
        <input type="text" id="fullname" name="fullname">

         <p></p>
        
         <label for="mat">Matric No:</label>
        <input type="number" id="mat" name="mat">


          <p></p>
        <label for="email">Email:</label>
        <input type="text" id="email" name="email">

        <p></p>
         <label for="age">Age:</label>
         <input type="number" id="age" name="age">

          <p>Gender:</p>
        <input type="radio" id="male" name="male" value="male">
        <label for="male">MALE</label>
        <input type="radio" id="female" name="female" value="female">
        <label for="female">FEMALE</label>

         <p></p>
         <label for="dob">DOB:</label>
         <input type="date" id="don" name="dob">

        <p></p>
         <label for="falc">Faculty:</label>
         <input type="text" id="fac" name="fac">


        <p>Documents Submitted:</p>
        <input type="radio" id="amin" name="document" value="admin">
        <label for="male">Admission letter</label>
        <input type="radio" id="receit" name="document" value="receit">
        <label for="female">Payment receit</label>

        <p></p>
        <label for="pass">Passport:</label>
        <input type="file" id="pass" name="pass">


        
         <p></p>
         <label for="message">Additional Information:</label><br>
<textarea id="message" name="message" rows="4"
cols="40"></textarea><br><br>

<input type="submit" value="Submit">
<input type="reset" value="Reset">
</fieldset>
   
</form>
